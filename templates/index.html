<!DOCTYPE html>
<html>
<head>
<title>NOVA</title>
<style>
body { font-family: Arial, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #0f0f1a; color: #fff; }
h1 { text-align: center; color: #00d4ff; letter-spacing: 2px; }
#chat-box { background: #1a1a2e; height: 380px; overflow-y: auto; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #00d4ff33; }
.user-msg { text-align: right; margin: 10px 0; }
.user-msg span { background: #00d4ff; color: #0f0f1a; padding: 8px 14px; border-radius: 14px; display: inline-block; max-width: 80%; }
.bot-msg { text-align: left; margin: 10px 0; }
.bot-msg span { background: #2a2a40; color: #fff; padding: 8px 14px; border-radius: 14px; display: inline-block; max-width: 80%; }
#input-area { display: flex; gap: 10px; margin-bottom: 10px; }
#user-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #00d4ff55; background: #1a1a2e; color: #fff; font-size: 14px; }
button { padding: 12px 18px; background: #00d4ff; color: #0f0f1a; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; }
.play-btn { background: #444; padding: 4px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; border: none; color: white; margin-left: 8px; }
#typing { color: #888; font-size: 12px; padding-left: 10px; display: none; }
#upload-area { margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
#status { color: #0f0; font-size: 12px; }
</style>
</head>
<body>
<h1>NOVA</h1>
<div id="upload-area">
<input type="file" id="file-input" accept=".pdf"/>
<button onclick="uploadFile()">Upload PDF</button>
</div>
<div id="upload-area">
<input type="file" id="image-input" accept="image/*"/>
<button onclick="uploadImage()">Analyze Image</button>
<span id="status"></span>
</div>
<div id="chat-box"></div>
<div id="typing">NOVA is thinking...</div>
<div id="input-area">
<input type="text" id="user-input" placeholder="Talk to NOVA..."/>
<button onclick="sendMessage()">Send</button>
</div>
<script>
async function uploadFile() {
const fileInput = document.getElementById("file-input");
const status = document.getElementById("status");
if (!fileInput.files[0]) return;
const formData = new FormData();
formData.append("file", fileInput.files[0]);
status.innerText = "Uploading...";
const response = await fetch("/upload", { method: "POST", body: formData });
const data = await response.json();
status.innerText = data.status;
}
async function uploadImage() {
const imageInput = document.getElementById("image-input");
const status = document.getElementById("status");
const chatBox = document.getElementById("chat-box");
const typing = document.getElementById("typing");
if (!imageInput.files[0]) return;
const formData = new FormData();
formData.append("image", imageInput.files[0]);
status.innerText = "Analyzing image...";
typing.style.display = "block";
const response = await fetch("/vision", { method: "POST", body: formData });
const data = await response.json();
typing.style.display = "none";
status.innerText = "";
chatBox.innerHTML += '<div class="bot-msg"><span>' + data.reply + '</span> <button class="play-btn" onclick="playAudio()">Play</button></div>';
chatBox.scrollTop = chatBox.scrollHeight;
}
async function sendMessage() {
const input = document.getElementById("user-input");
const chatBox = document.getElementById("chat-box");
const typing = document.getElementById("typing");
const message = input.value.trim();
if (!message) return;
chatBox.innerHTML += '<div class="user-msg"><span>' + message + '</span></div>';
input.value = "";
chatBox.scrollTop = chatBox.scrollHeight;
typing.style.display = "block";
const response = await fetch("/chat", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({message: message})
});
const data = await response.json();
typing.style.display = "none";
chatBox.innerHTML += '<div class="bot-msg"><span>' + data.reply + '</span> <button class="play-btn" onclick="playAudio()">Play</button></div>';
chatBox.scrollTop = chatBox.scrollHeight;
}
function playAudio() {
const audio = new Audio("/static/reply.mp3?t=" + new Date().getTime());
audio.play();
}
document.getElementById("user-input").addEventListener("keypress", function(e) {
if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
