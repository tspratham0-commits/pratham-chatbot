<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #f0f0f0; }
        h1 { text-align: center; color: #333; }
        #chat-box { background: white; height: 400px; overflow-y: auto; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .user-msg { text-align: right; color: blue; margin: 8px 0; }
        .bot-msg { text-align: left; color: green; margin: 8px 0; }
        #input-area { display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .play-btn { background: #2196F3; padding: 4px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; color: white; margin-left: 8px; }
    </style>
</head>
<body>
    <h1>My AI Chatbot 🤖</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message..."/>
        <button onclick="sendMessage()">Send</button>
    </div>
    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = input.value.trim();
            if (!message) return;
            chatBox.innerHTML += `<div class="user-msg">You: ${message}</div>`;
            input.value = "";
            const response = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            });
            const data = await response.json();
            chatBox.innerHTML += `<div class="bot-msg">Bot: ${data.reply} <button class="play-btn" onclick="playAudio()">🔊 Play</button></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function playAudio() {
            const audio = new Audio("/static/reply.mp3?t=" + new Date().getTime());
            audio.play();
        }
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
